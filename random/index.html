<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 关键 viewport 设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>高级随机数生成器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 原有HTML结构保持不变 -->
    <script src="script.js"></script>
</body>
</html>
<body>
    <div class="container">
        <h1>高级随机数生成器</h1>
        
        <div class="input-group">
            <label for="min">最小值:</label>
            <input type="number" id="min" value="1" min="0">
            
            <label for="max">最大值:</label>
            <input type="number" id="max" value="100" min="1">
        </div>

        <div class="input-group">
            <label for="exclude">排除数字 (用逗号分隔):</label>
            <input type="text" id="exclude" placeholder="例如: 5,13,42">
        </div>

        <div id="randomNumber" class="random-number">0</div>
        <button id="generateButton">生成随机数</button>
        <div id="error" class="error-message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<!-- 在原有HTML基础上增加毛玻璃容器 -->

    <div class="container">
        <!-- 原有内容保持不变 -->
    </div>
</div>
